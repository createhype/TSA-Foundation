name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Show build output tree
        run: find . -maxdepth 5 -not -path '*/node_modules/*' -not -path '*/.git/*' | sort

      - name: Set output path
        id: output_path
        run: |
          if [ -d ".output/public" ] && [ -f ".output/public/index.html" ]; then
            echo "path=.output/public" >> $GITHUB_OUTPUT
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          elif [ -d ".output/public" ]; then
            echo "path=.output/public" >> $GITHUB_OUTPUT
          elif [ -d "dist" ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No build output found" && exit 1
          fi
          echo "Detected output path: $(cat $GITHUB_OUTPUT | grep path | tail -1)"

      - name: Add SPA fallback and nojekyll
        run: |
          OUT="${{ steps.output_path.outputs.path }}"
          # Prevent Jekyll from ignoring _-prefixed folders
          touch "$OUT/.nojekyll"
          # SPA fallback: copy index.html to 404.html so deep links work
          if [ -f "$OUT/index.html" ]; then
            cp "$OUT/index.html" "$OUT/404.html"
            echo "Copied index.html → 404.html"
          else
            echo "WARNING: index.html not found in $OUT"
            ls -la "$OUT"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.output_path.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
